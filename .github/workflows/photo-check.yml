name: Photo Link Checker

on:
  # Run weekly on Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'
  # Run on PRs that touch speciesData.js
  pull_request:
    paths:
      - 'js/speciesData.js'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-photos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and check PHOTO_MAP URLs
        run: |
          # Extract only PHOTO_MAP section (starts at "const PHOTO_MAP", ends at next "const " or EOF)
          sed -n '/^const PHOTO_MAP/,/^const [A-Z]/p' js/speciesData.js | \
            grep -o "url:'[^']*'" | sed "s/^url:'//;s/'$//" | sort -u > /tmp/photo_urls.txt

          total=$(wc -l < /tmp/photo_urls.txt)
          echo "Found $total unique photo URLs to check"
          echo ""

          broken=0
          checked=0
          rate_limited=0

          while IFS= read -r url; do
            checked=$((checked + 1))

            # Use GET (not HEAD — Wikimedia CDN returns 404 for HEAD on thumbnails)
            # -r 0-0 fetches only first byte to minimize bandwidth
            status=$(curl -o /dev/null -s -w '%{http_code}' -L --max-time 15 -r 0-0 \
              -H "User-Agent: TreeOfLife-PhotoChecker/1.0 (https://github.com/Behemot46/tree-of-life; CI link check)" \
              "$url" 2>/dev/null || echo "000")

            # Retry once on 429 after waiting
            if [ "$status" -eq 429 ]; then
              sleep 5
              status=$(curl -o /dev/null -s -w '%{http_code}' -L --max-time 15 -r 0-0 \
                -H "User-Agent: TreeOfLife-PhotoChecker/1.0 (https://github.com/Behemot46/tree-of-life; CI link check)" \
                "$url" 2>/dev/null || echo "000")
            fi

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "✅ [$status] $url"
            elif [ "$status" -eq 429 ]; then
              echo "⏳ [$status] $url (rate-limited, skipping)"
              rate_limited=$((rate_limited + 1))
            else
              echo "❌ [$status] $url"
              broken=$((broken + 1))
            fi

            # Be polite to Wikimedia servers
            sleep 1
          done < /tmp/photo_urls.txt

          echo ""
          echo "=============================="
          echo "Checked: $checked / $total"
          echo "Broken:  $broken"
          if [ "$rate_limited" -gt 0 ]; then
            echo "Rate-limited (skipped): $rate_limited"
          fi
          echo "=============================="

          if [ "$broken" -gt 0 ]; then
            echo ""
            echo "⚠️  $broken broken photo link(s) found. Update PHOTO_MAP in js/speciesData.js."
            exit 1
          fi

          if [ "$rate_limited" -gt 0 ]; then
            echo ""
            echo "⚠️  $rate_limited URL(s) were rate-limited and could not be verified. Re-run the check later."
          fi

          echo "✅ All verifiable photo links are valid."
