name: Photo Link Checker

on:
  # Run weekly on Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'
  # Run on PRs that touch speciesData.js
  pull_request:
    paths:
      - 'js/speciesData.js'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-photos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and check PHOTO_MAP URLs
        run: |
          # Extract only PHOTO_MAP section (starts at "const PHOTO_MAP", ends at next "const " or EOF)
          sed -n '/^const PHOTO_MAP/,/^const [A-Z]/p' js/speciesData.js | \
            grep -o "url:'[^']*'" | sed "s/^url:'//;s/'$//" > /tmp/photo_urls.txt

          total=$(wc -l < /tmp/photo_urls.txt)
          echo "Found $total photo URLs to check"
          echo ""

          broken=0
          checked=0

          while IFS= read -r url; do
            checked=$((checked + 1))
            # Use curl with redirect follow, 10s timeout, HEAD request, proper User-Agent
            status=$(curl -o /dev/null -s -w '%{http_code}' --head -L --max-time 10 \
              -H "User-Agent: TreeOfLife-PhotoChecker/1.0 (https://github.com/Behemot46/tree-of-life; CI link check)" \
              "$url" 2>/dev/null || echo "000")

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "✅ [$status] $url"
            else
              echo "❌ [$status] $url"
              broken=$((broken + 1))
            fi

            # Be polite to Wikimedia servers — 1s delay to avoid 429 rate limiting
            sleep 1
          done < /tmp/photo_urls.txt

          echo ""
          echo "=============================="
          echo "Checked: $checked / $total"
          echo "Broken:  $broken"
          echo "=============================="

          if [ "$broken" -gt 0 ]; then
            echo ""
            echo "⚠️  $broken broken photo link(s) found. Update PHOTO_MAP in js/speciesData.js."
            exit 1
          fi

          echo "✅ All photo links are valid."
