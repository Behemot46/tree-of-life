<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable: safe zone is inner 80% (51.2px inset on each side) -->
  <rect width="512" height="512" fill="#1a1d23"/>
  <!-- Trunk -->
  <line x1="256" y1="390" x2="256" y2="200" stroke="#5b9a8b" stroke-width="8" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="256" y1="270" x2="175" y2="175" stroke="#5b9a8b" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="270" x2="337" y2="175" stroke="#5b9a8b" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="150" y2="140" stroke="#5b9a8b" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="362" y2="140" stroke="#5b9a8b" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="210" y2="120" stroke="#5b9a8b" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="302" y2="120" stroke="#5b9a8b" stroke-width="4" stroke-linecap="round"/>
  <!-- Sub-branches -->
  <line x1="175" y1="175" x2="130" y2="130" stroke="#5b9a8b" stroke-width="4" stroke-linecap="round"/>
  <line x1="337" y1="175" x2="382" y2="130" stroke="#5b9a8b" stroke-width="4" stroke-linecap="round"/>
  <!-- Domain dots -->
  <circle cx="130" cy="127" r="13" fill="#ef4444"/>
  <circle cx="150" cy="137" r="12" fill="#f59e0b"/>
  <circle cx="175" cy="172" r="13" fill="#22c55e"/>
  <circle cx="210" cy="117" r="11" fill="#a855f7"/>
  <circle cx="302" cy="117" r="11" fill="#f97316"/>
  <circle cx="337" cy="172" r="13" fill="#3b82f6"/>
  <circle cx="362" cy="137" r="12" fill="#0ea5e9"/>
  <circle cx="382" cy="127" r="13" fill="#8b5cf6"/>
  <!-- Root glow -->
  <circle cx="256" cy="390" r="9" fill="#8b5cf6" opacity="0.8"/>
</svg>
